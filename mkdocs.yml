# AirShop Documentation Site
# docs.airshop.work | help.airshop.work
# MkDocs Material - dark mode only, AirShop brand
# Run: mkdocs serve --watch-theme  (watches overrides + docs for live reload)

site_name: AirShop Docs
site_description: AirShop help and documentation for quotes, orders, and inventory management in manufacturing and fabrication workflows.
site_url: https://docs.airshop.work
copyright: © 2026 AirShop Works Inc. All rights reserved.

theme:
  name: material
  language: en
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo-hex.svg
  favicon: assets/favicon.png
  custom_dir: overrides
  features:
    # navigation.instant disabled - breaks CSS live reload (browser won't full-reload)
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link

plugins:
  - search:
      lang: en
  - glightbox:
      effect: none
      slide_effect: none
  - social:
      cards_layout_dir: layouts
      cards_layout: airshop
      cards_layout_options:
        font_family: Inter
        background_color: "#03366D"
        color: "#f2f2f2"
        logo: layouts/logo-hex.png

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  generator: false
  # Google Analytics - same property as airshop (NEXT_PUBLIC_GA_MEASUREMENT_ID)
  analytics:
    provider: google
    property: G-497324105

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/tawk.js
  - javascripts/extra.js

nav:
  - AirShop:
    - AirShop: airshop/index.md
    - Can I just use quoting or inventory?: airshop/use-one-part.md
    - Glossary: glossary.md
    - Keyboard Shortcuts: airshop/keyboard-shortcuts.md
    - Notes Editor: airshop/notes-editor.md
  - Home: index.md
  # https://docs.airshop.work/imports
  - Imports & Exports:
    - Bulk Imports: imports/index.md
    - Bulk Import Customers: imports/bulk-import-customers.md
    - Bulk Import Inventory: inventory/bulk-import.md
    - Bulk Import Organizations: imports/bulk-import-organizations.md
    - QuickBooks Import: imports/quickbooks-import.md
    - Inventory Export: inventory/inventory-export.md
  - Inventory:
    - Inventory: inventory/index.md
    - Cards & Bin Labels: inventory/cards-and-labels.md
    - QR Code Scanning: inventory/qr-code-scanning.md
    - URL Cleaning: inventory/url-cleaning.md
    - Inventory Export: inventory/inventory-export.md
  - Inquiries:
    - Inquiry Forms: setup/inquiry-forms.md
    - Inquiry Settings: setup/inquiry-settings.md
    - Open in Fusion: open-fusion.md
  - Quotes:
    - Quotes: quotes/index.md
    - Create a Quote: quotes/create-quote.md
    - Quote Statuses: quotes/quote-statuses.md
    - Send and Share Quotes: quotes/send-and-share-quotes.md
    - Quote Revisions: quotes/quote-revisions.md
    - Undo Quote Approval: quotes/undo-quote.md
    - Quote Follow-ups: follow-ups.md
    - Quote View Tracking: quotes/view-tracking.md
    - Quote Options Panel: quotes/quote-options-panel.md
    - Quote Settings: quote-settings.md
  - Setup:
    - Setup: setup/index.md
    - Integrations: integrations/index.md
    - Outbound Webhooks: integrations/outbound-webhooks.md
    - Subscription: setup/subscription.md
    - Referrals: setup/referrals.md
    - FAQ: setup/faq.md
    - Help Scout Integration: setup/helpscout.md
    - Quick Start: setup/quick-start.md
